name: stock-scan
on:
  repository_dispatch:
    types: [tw, us, fundamentals]
  schedule:
    - cron: '25 4 * * 1-5'
    - cron: '15 19 * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'fundamentals=建庫+財報, tw=台股掃描, us=美股掃描'
        type: choice
        default: fundamentals
        options: [fundamentals, tw, us, auto]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - run: python scan.py ${{ github.event.inputs.mode || github.event.action || 'auto' }}
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
      - name: Commit results
        run: |
          git config user.name "scan-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "scan $(date -u +'%Y-%m-%d %H:%M')"
          git push
